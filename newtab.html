<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>New Tab</title>
  <!-- Immediate solid dark background — blocks white flash before any JS runs -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1c1b22;
      color: #f5f5f7;
      min-height: 100%;
      overflow-x: hidden;
    }
    /* Hide UI until staged reveal */
    #app {
      opacity: 0;
      visibility: hidden;
    }
    #app.is-ready {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    #wallpaper {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #1c1b22 center / cover no-repeat;
      pointer-events: none;
    }
    #wallpaper::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(28, 27, 34, 0.55) 0%,
        rgba(28, 27, 34, 0.72) 40%,
        rgba(28, 27, 34, 0.92) 100%
      );
    }
    /* Fixed chrome from frame 1 — no staged-reveal dependency */
    .chrome-toolbar {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 8px;
      border-radius: 999px;
      background: #1c1b22;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(245, 245, 247, 0.72);
    }
    .chrome-toolbar button {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: inherit;
      cursor: pointer;
      border-radius: 8px;
      padding: 0;
    }
    .fab-cluster {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fab-cluster .settings-fab {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #25242c;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(245, 245, 247, 0.72);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      text-decoration: none;
      cursor: pointer;
      padding: 0;
    }
  </style>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/settings.css" />
</head>
<body>
  <div id="wallpaper" aria-hidden="true"></div>

  <div id="app" class="app">
    <!-- Corner widgets: fixed to viewport edges; inside #app for staged reveal -->
    <div class="header__stocks" id="stocks-root"></div>
    <div class="header__weather" id="weather-root"></div>

    <header class="header" id="header">
      <div class="header__center">
        <form class="search" id="search-form" autocomplete="off" role="search">
          <span class="search__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
          </span>
          <input
            type="text"
            class="search__input"
            id="search-input"
            placeholder="Search with Google or enter address"
            spellcheck="false"
            aria-label="Search with Google or enter address"
          />
        </form>

        <div class="shortcuts" id="shortcuts-root" hidden></div>
      </div>
    </header>

    <main class="main" id="main">
      <div class="feed" id="feed-root"></div>
    </main>
  </div>

  <!-- Fixed chrome — outside #app so it paints on frame 1 (no staged-reveal fade) -->
  <nav class="chrome-toolbar" id="chrome-toolbar" aria-label="Quick access">
    <button type="button" class="chrome-toolbar__btn" data-chrome-url="chrome://settings" title="Settings" aria-label="Chrome settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </button>
    <button type="button" class="chrome-toolbar__btn" data-chrome-url="chrome://extensions" title="Extensions" aria-label="Extensions">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 4a2 2 0 1 1 4 0v1h3a2 2 0 0 1 2 2v3h1a2 2 0 1 1 0 4h-1v3a2 2 0 0 1-2 2h-3v1a2 2 0 1 1-4 0v-1H7a2 2 0 0 1-2-2v-3H4a2 2 0 1 1 0-4h1V7a2 2 0 0 1 2-2h3V4z"/>
      </svg>
    </button>
    <button type="button" class="chrome-toolbar__btn" data-chrome-url="chrome://bookmarks" title="Bookmarks" aria-label="Bookmarks">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button type="button" class="chrome-toolbar__btn" data-chrome-url="chrome://history" title="History" aria-label="History">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 2"/>
      </svg>
    </button>
    <button type="button" class="chrome-toolbar__btn" data-chrome-url="chrome://downloads" title="Downloads" aria-label="Downloads">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>
      </svg>
    </button>
  </nav>

  <div class="fab-cluster" id="fab-cluster">
    <a
      class="settings-fab feeds-fab"
      id="feeds-fab"
      href="feeds.html"
      aria-label="Open feed reader"
      title="Feeds"
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
    </a>
    <button
      type="button"
      class="settings-fab"
      id="settings-fab"
      aria-label="Open settings"
      title="Settings"
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <!-- Settings drawer portal -->
  <div class="settings-overlay" id="settings-overlay" hidden></div>
  <aside class="settings-drawer" id="settings-drawer" aria-hidden="true" aria-label="Settings">
    <div class="settings-drawer__header">
      <h2 class="settings-drawer__title">Settings</h2>
      <button type="button" class="settings-drawer__close" id="settings-close" aria-label="Close settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="settings-drawer__body" id="settings-body"></div>
  </aside>

  <!-- Context menu portal -->
  <div class="ctx-menu" id="ctx-menu" hidden role="menu"></div>

  <!-- Shortcut edit modal -->
  <div class="modal-overlay" id="modal-overlay" hidden></div>
  <div class="modal" id="shortcut-modal" hidden role="dialog" aria-labelledby="shortcut-modal-title">
    <h3 id="shortcut-modal-title" class="modal__title">Edit Shortcut</h3>
    <form id="shortcut-form" class="modal__form">
      <label class="field">
        <span class="field__label">Name</span>
        <input type="text" id="shortcut-name" class="field__input" required maxlength="40" />
      </label>
      <label class="field">
        <span class="field__label">URL</span>
        <input type="url" id="shortcut-url" class="field__input" required placeholder="https://" />
      </label>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" id="shortcut-cancel">Cancel</button>
        <button type="submit" class="btn btn--primary" id="shortcut-save">Save</button>
      </div>
    </form>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
