<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Feeds — Candy</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1c1b22;
      color: #f5f5f7;
      min-height: 100%;
    }
    #reader-app {
      opacity: 0;
      visibility: hidden;
    }
    #reader-app.is-ready {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
  </style>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/settings.css" />
  <link rel="stylesheet" href="css/feeds.css" />
</head>
<body>
  <div id="reader-app" class="reader">
    <header class="reader-header">
      <div class="reader-header__left">
        <a href="newtab.html" class="reader-back" title="Back to New Tab" aria-label="Back to New Tab">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        </a>
        <div>
          <h1 class="reader-title">Feeds</h1>
          <p class="reader-subtitle" id="reader-subtitle">RSS · Atom · JSON Feed · Substack</p>
        </div>
      </div>
      <div class="reader-header__actions">
        <label class="reader-search" title="Filter cached items">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="reader-search" placeholder="Filter stories…" autocomplete="off" spellcheck="false" aria-label="Filter stories" />
        </label>
        <button type="button" class="btn btn--ghost btn--sm" id="reader-refresh-all" title="Refresh all feeds">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          Refresh
        </button>
        <button type="button" class="settings-fab reader-settings-fab" id="reader-settings-btn" aria-label="Manage feeds and settings" title="Manage feeds">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="reader-layout">
      <aside class="reader-sidebar" id="reader-sidebar" aria-label="Subscriptions"></aside>
      <main class="reader-main">
        <div class="reader-list" id="reader-list"></div>
      </main>
    </div>
  </div>

  <!-- Manage subscriptions drawer (page-local, not main extension settings) -->
  <div class="settings-overlay" id="reader-overlay" hidden></div>
  <aside class="settings-drawer" id="reader-drawer" aria-hidden="true" aria-label="Manage feeds">
    <div class="settings-drawer__header">
      <h2 class="settings-drawer__title">Manage Feeds</h2>
      <button type="button" class="settings-drawer__close" id="reader-drawer-close" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="settings-drawer__body" id="reader-drawer-body"></div>
  </aside>

  <script type="module" src="js/reader/app.js"></script>
</body>
</html>
